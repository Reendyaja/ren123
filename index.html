<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingo Predictor Pro</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a0a12; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Panel Prediksi Kiri Atas */
        #predPanel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid #8a2be2;
            border-left: 4px solid #8a2be2;
            border-radius: 12px;
            padding: 12px;
            width: 150px;
            z-index: 9999;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
            font-family: sans-serif;
            color: #f8f9ff;
            pointer-events: none;
        }
        .h { font-size: 10px; color: #9ca3b3; text-transform: uppercase; margin-bottom: 2px; }
        .v { font-size: 15px; font-weight: 700; margin-bottom: 8px; color: #00f5d4; }
        .badge { display: block; text-align: center; padding: 7px; border-radius: 8px; font-weight: 800; font-size: 13px; color: white; }
    </style>
</head>
<body>

    <div id="predPanel">
        <div class="h">Time</div>
        <div id="u-timer" class="v">--:--</div>
        <div class="h">Period</div>
        <div id="u-period" class="v" style="color:#00c6ff; font-size:11px;">--------</div>
        <div style="border-top:1px solid rgba(255,255,255,0.1); margin: 8px 0;"></div>
        <div id="u-res"><span class="badge" style="background:#333;">WAIT...</span></div>
    </div>

    <iframe id="game-frame" src="/games/wingo"></iframe>

    <script>
        function sync() {
            try {
                const frame = document.getElementById('game-frame');
                const doc = frame.contentDocument || frame.contentWindow.document;
                const win = frame.contentWindow;

                const rt = doc.getElementById('timerValue');
                const rp = doc.getElementById('currentPeriodCompact');
                
                if (rt) document.getElementById('u-timer').textContent = rt.textContent;
                if (rp) document.getElementById('u-period').textContent = rp.textContent;

                if (win.lastResults && win.lastResults.length >= 3) {
                    const r0 = win.lastResults[0].result;
                    const r2 = win.lastResults[2].result;
                    const res = (r0 + r2) % 10;
                    const isB = res >= 5;
                    const col = isB ? '#2ed573' : '#ff4757';

                    document.getElementById('u-res').innerHTML = `
                        <span class="badge" style="background:${col}; box-shadow: 0 4px 10px ${col}66;">
                            ${res} - ${isB ? 'BESAR' : 'KECIL'}
                        </span>
                        <div style="font-size:9px; color:#666; text-align:center; margin-top:5px;">Logic: ${r0}+${r2}</div>
                    `;
                }
            } catch (e) {}
        }
        setInterval(sync, 1000);
    </script>
</body>
</html>
